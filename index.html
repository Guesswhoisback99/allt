<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wyniki Badań Krwi</title>
  <script type="module" crossorigin src="./assets/index-WJnh7gr0.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-C2I1NQad.css">
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-mark">
        <svg width="14" height="16" viewBox="0 0 14 16" fill="none">
          <path d="M7 1C7 1 3.5 6.5 3.5 10a3.5 3.5 0 007 0C10.5 6.5 7 1 7 1z" fill="white" opacity="0.92"/>
        </svg>
      </div>
      <span class="logo-name">WynikiLab</span>
    </a>
    <nav>
      <button class="tab active" data-tab="chart">Wykres</button>
      <button class="tab" data-tab="table">Tabela</button>
    </nav>
  </div>
</header>

<main>

  <!-- ══ CHART ══ -->
  <section id="chart" class="view active">
    <div class="controls-row">
      <div class="ctrl-group">
        <div class="ctrl-label">
          <span class="dot" style="background:var(--p1)"></span>
          Parametr 1 — oś lewa
        </div>
        <select id="sel1"></select>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">
          <span class="dot" style="background:var(--p2)"></span>
          Parametr 2 — oś prawa
        </div>
        <select id="sel2"></select>
      </div>
      <div class="spacer"></div>
    </div>

    <div class="events-bar">
      <span class="events-bar-label">Zdarzenia</span>
      <div class="event-chips" id="event-chips"></div>
    </div>

    <div class="card" style="padding:20px 20px 16px;">
      <div class="chart-wrap">
        <div id="mainChart"></div>
      </div>
      <div class="chart-toolbar">
        <button type="button" id="pan-left" class="btn-icon" aria-label="Przesuń w lewo" title="Przesuń w lewo">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button type="button" id="zoom-out" class="btn-icon" aria-label="Pomniejsz" title="Pomniejsz">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        </button>
        <button type="button" id="reset-zoom" class="btn-reset-zoom">Resetuj zoom</button>
        <button type="button" id="zoom-in" class="btn-icon" aria-label="Powiększ" title="Powiększ">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 3v8M3 7h8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
        </button>
        <button type="button" id="pan-right" class="btn-icon" aria-label="Przesuń w prawo" title="Przesuń w prawo">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <div class="legend-row" id="legend"></div>
    <p class="chart-hint">Przewiń aby powiększyć &nbsp;·&nbsp; Przeciągnij aby przesunąć &nbsp;·&nbsp; Użyj suwaka aby zawęzić zakres</p>
  </section>

  <!-- ══ TABLE ══ -->
  <section id="table" class="view">
    <div class="table-layout">
      <div class="date-sidebar">
        <div class="date-sidebar-head">
          <span>Daty badań</span>
          <span id="date-count" style="font-weight:400;"></span>
        </div>
        <input class="date-search" id="date-search" type="text" placeholder="Szukaj daty…">
        <div class="date-list" id="date-list"></div>
      </div>
      <div>
        <div class="card" style="padding:0;overflow:hidden;" id="table-card"></div>
      </div>
    </div>
  </section>

</main>

</body>
</html>
